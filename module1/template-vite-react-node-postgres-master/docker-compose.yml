services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: sh -c "pnpm install && pnpm dev || npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "pnpm install && pnpm dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
